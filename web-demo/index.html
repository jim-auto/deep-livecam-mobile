<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Deep LiveCam Mobile Web Demo</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">mobile browser prototype</p>
          <h1>Deep LiveCam Mobile Web Demo</h1>
        </div>
        <div class="actions" aria-label="Input actions">
          <button id="cameraButton" type="button">Open camera</button>
          <button id="captureButton" type="button" disabled>Capture</button>
          <label class="upload target-upload">
            <input id="imageInput" type="file" accept="image/*" capture="user">
            <span>Target image</span>
          </label>
          <label class="upload source-upload">
            <input id="sourceFaceInput" type="file" accept="image/*">
            <span>Source face</span>
          </label>
        </div>
      </header>

      <video id="cameraVideo" playsinline muted></video>

      <div class="view-tabs" role="tablist" aria-label="Demo view">
        <button id="resultTab" class="view-tab active" type="button" role="tab" aria-selected="true">Result</button>
        <button id="sourceTab" class="view-tab" type="button" role="tab" aria-selected="false">Source</button>
      </div>

      <section class="workspace" aria-label="Face swap demo workspace">
        <div id="sourcePanel" class="panel source-panel">
          <div class="panel-head">
            <h2>Source</h2>
            <span id="sourceMeta">sample frame</span>
          </div>
          <canvas id="beforeCanvas" width="1280" height="720"></canvas>
        </div>

        <div id="resultPanel" class="panel result-panel active">
          <div class="panel-head">
            <h2>Result</h2>
            <span id="engineMeta">dummy-overlay</span>
          </div>
          <canvas id="afterCanvas" width="1280" height="720"></canvas>
        </div>
      </section>

      <section class="controls" aria-label="Demo controls">
        <div class="control-group">
          <label for="backendSelect">Backend</label>
          <select id="backendSelect">
            <option value="landmarker">MediaPipe Face Landmarker</option>
            <option value="mediapipe">MediaPipe Face Detector</option>
            <option value="placeholder">Center Fallback</option>
            <option value="onnx" disabled>ONNX Runtime Web</option>
            <option value="webgpu" disabled>WebGPU</option>
          </select>
        </div>
        <div class="control-group">
          <label for="overlayStrength">Swap amount</label>
          <input id="overlayStrength" type="range" min="0" max="100" value="62">
        </div>
        <div class="control-group source-preview-group" aria-live="polite">
          <p class="control-label">Active source</p>
          <div class="source-preview-card">
            <canvas id="sourcePreview" width="72" height="72" aria-hidden="true"></canvas>
            <div class="source-preview-copy">
              <strong id="sourcePreviewState">synthetic</strong>
              <span id="sourcePreviewName">Default texture</span>
            </div>
          </div>
        </div>
        <button id="runButton" type="button">Run pseudo swap</button>
        <p id="status" role="status">Ready.</p>
      </section>

      <p class="safety-note">
        Prototype demo. No real identity transfer yet. Use only with consent and do not use it for impersonation or deceptive content.
      </p>
    </main>
  </body>
</html>
